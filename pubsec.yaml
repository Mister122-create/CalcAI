name: calkai
description: CalcAI - Calculatrice intelligente avec IA intégrée
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6

  # State management (important pour l’app)
  provider: ^6.1.2

  # HTTP pour IA / API future
  http: ^1.2.2

  # Formatage
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
